# Signature e-mail CANET CONSTRUCTION (Pierre CANET).
#
# Gabarit réutilisable pour le système de templates email-mcp.
# Installation : copier ce fichier dans ~/.config/email-mcp/templates/
# (le dossier exact est donné par `list_templates`). Il apparaît alors via
# l'outil MCP `list_templates` et se récupère avec `apply_template`.
#
# Le logo est référencé en image inline « cid » : <img src="cid:logoCanet">.
# Il n'est PAS inclus dans ce gabarit (c'est du texte) — il faut le joindre
# au moment de l'envoi/brouillon comme pièce inline portant le même `cid` :
#   { "path": "/chemin/absolu/logo.png", "cid": "logoCanet" }
# Voir scripts/draft-canet-signature.ts pour un exemple clé-en-main.
#
# Styles inline volontaires (table simple, pas de CSS externe) pour rester
# compatible Outlook et Gmail.

name = "canet-signature"
description = "Signature CANET CONSTRUCTION avec logo inline (cid:logoCanet)"
subject = ""
variables = []
body = """
<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#000000;">
  <tr>
    <td valign="top" style="padding:0 14px 0 0;vertical-align:top;">
      <img src="cid:logoCanet" alt="CANET CONSTRUCTION" width="110" height="110" style="display:block;width:110px;height:110px;border:0;" />
    </td>
    <td valign="top" style="vertical-align:top;">
      <div style="font-weight:bold;">Pierre CANET</div>
      <div style="font-style:italic;font-weight:bold;color:#86A7D2;">Ma&icirc;tre d&rsquo;&oelig;uvre - Designer</div>
      <div style="height:10px;line-height:10px;">&nbsp;</div>
      <div>12 rue du Trait&eacute; de Paris, 44210 PORNIC</div>
      <div><span style="font-weight:bold;color:#86A7D2;">t&eacute;l :</span>&nbsp;&nbsp;&nbsp;02 51 74 18 66</div>
      <div><span style="font-weight:bold;color:#86A7D2;">mail :</span> <a href="mailto:contact@pierrecanet.fr" style="color:#0563C1;text-decoration:underline;">contact@pierrecanet.fr</a></div>
      <div><span style="font-weight:bold;color:#86A7D2;">web :</span> <a href="http://www.pierrecanet.fr" style="color:#0563C1;text-decoration:underline;">www.pierrecanet.fr</a></div>
    </td>
  </tr>
</table>
"""
